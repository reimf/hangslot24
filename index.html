<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangslot24</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <svg id="canvas" viewBox="0,0 710,510" xmlns="http://www.w3.org/2000/svg">
    <g id="padlock">
      <g id="shackle">
        <path id="arch" d="M 250,400 v -160 a 105,105 0 0 1 210,0 v 60" stroke-width="60" />
        <g id="level">
          <text id="level-top" x="355" y="135">
            <tspan class="level-text text-top text-easy">★☆☆</tspan>
            <tspan class="level-text text-top text-medium">★★☆</tspan>
            <tspan class="level-text text-top text-hard">★★★</tspan>
          </text>
          <text id="level-bottom" x="355" y="135">
            <tspan class="level-text text-bottom text-easy">easy</tspan>
            <tspan class="level-text text-bottom text-medium">medium</tspan>
            <tspan class="level-text text-bottom text-hard">hard</tspan>
          </text>
        </g>
      </g>
      <rect id="body" x="200" y="260" width="310" height="240" rx="20" />
      <g>
        <g class="button number-button">
          <rect x="220" y="280" width="60" height="60" rx="10" />
          <text x="250" y="310"></text>
        </g>
        <g class="button number-button">
          <rect x="290" y="280" width="60" height="60" rx="10" />
          <text x="320" y="310"></text>
        </g>
        <g class="button number-button">
          <rect x="360" y="280" width="60" height="60" rx="10" />
          <text x="390" y="310"></text>
        </g>
        <g class="button number-button">
          <rect x="430" y="280" width="60" height="60" rx="10" />
          <text x="460" y="310"></text>
        </g>
      </g>
      <g>
        <g class="button operator-button">
          <rect x="220" y="350" width="60" height="60" rx="10" />
          <text x="250" y="380"></text>
        </g>
        <g class="button operator-button">
          <rect x="290" y="350" width="60" height="60" rx="10" />
          <text x="320" y="380"></text>
        </g>
        <g class="button operator-button">
          <rect x="360" y="350" width="60" height="60" rx="10" />
          <text x="390" y="380"></text>
        </g>
        <g class="button operator-button">
          <rect x="430" y="350" width="60" height="60" rx="10" />
          <text x="460" y="380"></text>
        </g>
      </g>
      <g>
        <g class="button undo-button">
          <rect x="220" y="420" width="60" height="60" rx="10" />
          <text x="250" y="450"></text>
        </g>
        <g class="button hint-button">
          <rect x="290" y="420" width="60" height="60" rx="10" />
          <text x="320" y="445"></text>
          <text class="malus" x="320" y="465">−€50</text>
        </g>
        <g>
          <text class="calculation" x="360" y="430"></text>
          <text class="calculation" x="360" y="450"></text>
          <text class="calculation" x="360" y="470"></text>
        </g>
      </g>
    </g>
    <g>
      <rect id="scorebox" x="600" y="100" width="100" height="50" rx="15" />
      <text id="score" x="650" y="125"></text>
    </g>
    <text id="timer" x="355" y="215"></text>
    <text id="points" x="355" y="240"></text>
  </svg>
  <script type="module" src="dist/index.js"></script>
</body>

</html>
