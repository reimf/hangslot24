<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangslot24</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-wrapper">
      <svg id="padlock" viewBox="0 0 360 410" xmlns="http://www.w3.org/2000/svg">
        <g id="shackle">
          <path fill-rule="evenodd" d="
            M 40,300 
            v -160 
            a 140,140 0 0 1 280,0 
            v 60 
            a 25,25 0 0 1 -50,0 
            a 20,20 0 0 0 0,-40 
            v -20 
            a 90,90 0 0 0 -180,0 
            v 160 
            z" fill="#b0bec5" stroke="none" />
        </g>
        <rect x="20" y="150" width="320" height="250" rx="20" fill="#2c3e50" />
        <g>
          <g class="button number-button" transform="translate(75,205)">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">?</text>
          </g>
          <g class="button number-button" transform="translate(145,205)">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">?</text>
          </g>
          <g class="button number-button" transform="translate(215,205)">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">?</text>
          </g>
          <g class="button number-button" transform="translate(285,205)">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">?</text>
          </g>
        </g>
        <g>
          <g class="button operator-button" transform="translate(75,275)" data-operatorname="add">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">+</text>
          </g>
          <g class="button operator-button" transform="translate(145,275)" data-operatorname="subtract">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">−</text>
          </g>
          <g class="button operator-button" transform="translate(215,275)" data-operatorname="multiply">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">×</text>
          </g>
          <g class="button operator-button" transform="translate(285,275)" data-operatorname="divide">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">÷</text>
          </g>
        </g>
        <g>
          <g class="button undo-button" transform="translate(75,345)">
            <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
            <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="button-text">←</text>
          </g>
        </g>
        <text x="315" y="375" text-anchor="end" dominant-baseline="auto" class="engraved-text">hangslot24</text>
      </svg>
    </div>
    <script type="module" src="dist/index.js"></script>
  </body>
</html>
