<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangslot24</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <svg id="padlock" viewBox="0 0 360 410" xmlns="http://www.w3.org/2000/svg">
      <g id="shackleGroup">
        <path id="shacklePath" fill-rule="evenodd" d="
              M 44,300
              L 44,140
              A 136,136 0 0 1 316,140
              L 316,201
              A 22,22 0 0 1 272,201
              L 272,140
              A 92,92 0 0 0 88,140
              L 88,300
              Z
              M 272,165 A 15,15 0 0 1 272,195 Z
            " fill="#b0bec5" stroke="none" />
      </g>
      <rect id="bodyGroup" x="28" y="158" width="304" height="238" rx="22" fill="#2c3e50" />

      <g id="numberGroup">
        <g class="button number-button" transform="translate(75,207)">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">?</text>
        </g>
        <g class="button number-button" transform="translate(145,207)">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">?</text>
        </g>
        <g class="button number-button" transform="translate(215,207)">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">?</text>
        </g>
        <g class="button number-button" transform="translate(285,207)">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">?</text>
        </g>
      </g>

      <g id="operatorGroup">
        <g class="button operator-button" transform="translate(75,277)" data-operatorname="add">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">+</text>
        </g>
        <g class="button operator-button" transform="translate(145,277)" data-operatorname="subtract">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">−</text>
        </g>
        <g class="button operator-button" transform="translate(215,277)" data-operatorname="multiply">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">×</text>
        </g>
        <g class="button operator-button" transform="translate(285,277)" data-operatorname="divide">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">÷</text>
        </g>
      </g>

      <g id="undoGroup">
        <g class="button undo-button" transform="translate(75,347)">
          <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#eaedf0" />
          <text x="0" y="0" dominant-baseline="central" text-anchor="middle" class="btn-label">←</text>
        </g>
      </g>

      <text id="engravingText" x="314" y="376" text-anchor="end" dominant-baseline="auto" class="engraving-text">hangslot24</text>
    </svg>
  </div>

  <script src="dist/game.js"></script>
</body>

</html>
