<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangslot24</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <svg id="padlock" viewBox="0 0 310 400" xmlns="http://www.w3.org/2000/svg">
      <g id="shackle">
        <path stroke="none" d="
            M 25,300 
            v -160 
            a 130,130 0 0 1 260,0 
            v 70 
            a 25,25 0 0 1 -50,0 
            a 20,20 0 0 0 0,-40 
            v -30 
            a 80,80 0 0 0 -160,0 
            v 160 
            z" />
      </g>
      <rect id="body" x="0" y="160" width="310" height="240" rx="20" />
      <g>
        <g>
          <g class="button number-button">
            <rect x="20" y="180" width="60" height="60" rx="10" />
            <text x="50" y="210"></text>
          </g>
          <g class="button number-button">
            <rect x="90" y="180" width="60" height="60" rx="10" />
            <text x="120" y="210"></text>
          </g>
          <g class="button number-button">
            <rect x="160" y="180" width="60" height="60" rx="10" />
            <text x="190" y="210"></text>
          </g>
          <g class="button number-button">
            <rect x="230" y="180" width="60" height="60" rx="10" />
            <text x="260" y="210"></text>
          </g>
        </g>
        <g>
          <g class="button operator-button">
            <rect x="20" y="250" width="60" height="60" rx="10" />
            <text x="50" y="280"></text>
          </g>
          <g class="button operator-button">
            <rect x="90" y="250" width="60" height="60" rx="10" />
            <text x="120" y="280"></text>
          </g>
          <g class="button operator-button">
            <rect x="160" y="250" width="60" height="60" rx="10" />
            <text x="190" y="280"></text>
          </g>
          <g class="button operator-button">
            <rect x="230" y="250" width="60" height="60" rx="10" />
            <text x="260" y="280"></text>
          </g>
        </g>
        <g>
          <g class="button undo-button">
            <rect x="20" y="320" width="60" height="60" rx="10" />
            <text x="50" y="350"></text>
          </g>
          <g>
            <text class="calculation" x="90" y="330"></text>
            <text class="calculation" x="90" y="350"></text>
            <text class="calculation" x="90" y="370"></text>
          </g>
          <text id="brand" x="290" y="375">hangslot24</text>
        </g>
      </g>
    </svg>
    <script type="module" src="dist/index.js"></script>
  </body>
</html>
